<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>睡眠打卡系统</title>
  <style>
    :root { color-scheme: light; font-family: "Segoe UI", "PingFang SC", sans-serif; }
    body { margin: 0; background: linear-gradient(120deg, #eef2ff, #f8fafc); color: #1f2937; }
    .container { max-width: 1040px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 28px rgba(17, 24, 39, .08); padding: 20px; margin-bottom: 16px; }
    h1, h2, h3 { margin: 0 0 12px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, textarea, button { font: inherit; }
    input, textarea { border: 1px solid #d1d5db; border-radius: 10px; padding: 10px; width: 100%; box-sizing: border-box; background: #fff; }
    textarea { min-height: 84px; resize: vertical; }
    button { border: 0; border-radius: 10px; padding: 10px 14px; cursor: pointer; }
    .primary { background: #1d4ed8; color: #fff; }
    .ghost { background: #eef2ff; color: #1d4ed8; }
    .danger { background: #fee2e2; color: #b91c1c; }
    .muted { color: #6b7280; font-size: 14px; }
    .hidden { display: none !important; }
    .list { display: grid; gap: 10px; }
    .item { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
    .item-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .tag { padding: 2px 8px; border-radius: 999px; font-size: 12px; background: #eef2ff; color: #3730a3; }
    .placeholder { color: #9ca3af; cursor: pointer; }
    .edit-btn { background: transparent; color: #4b5563; padding: 0; font-size: 18px; }
    .leader-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .rank-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #e5e7eb; padding: 8px 0; }
    .modal-backdrop { position: fixed; inset: 0; display: none; place-items: center; background: rgba(17, 24, 39, .45); z-index: 20; }
    .modal { width: min(700px, 92vw); background: #fff; border-radius: 14px; padding: 16px; }
    .modal.open { display: grid; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
    .auth-wrap { max-width: 460px; margin: 60px auto; }
    .time-pill { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #eef2ff; color: #1e40af; font-size: 13px; }
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .12);
      font-size: 14px;
      z-index: 30;
      display: none;
      max-width: min(92vw, 760px);
    }
    .toast.ok { display: block; background: #ecfdf3; color: #166534; border: 1px solid #86efac; }
    .toast.err { display: block; background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    button:disabled { opacity: .65; cursor: not-allowed; }
    @media (max-width: 760px) { .leader-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="container hidden" id="authPanel">
    <div class="auth-wrap card">
      <h1>欢迎来到睡眠打卡</h1>
      <p class="muted">简洁记录作息，回顾反思与每天的新鲜愉快小事。</p>
      <div class="row">
        <input id="authUsername" placeholder="用户名（至少3位）">
        <input id="authPassword" type="password" placeholder="密码（至少6位）">
      </div>
      <div class="actions">
        <button id="registerBtn" class="ghost">注册</button>
        <button id="loginBtn" class="primary">登录</button>
      </div>
      <p id="authMsg" class="muted"></p>
      <p class="muted">支持回车快速登录，明日计划可不填。</p>
    </div>
  </div>

  <div class="container hidden" id="appPanel">
    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <h1>睡眠打卡系统</h1>
        <div class="row">
          <span id="welcome" class="muted"></span>
          <button id="logoutBtn" class="danger">退出登录</button>
        </div>
      </div>
      <div class="row">
        <button id="sleepBtn" class="primary">晚睡打卡</button>
        <button id="wakeBtn" class="ghost">早起打卡</button>
      </div>
      <p class="muted">22:00 后晚睡打卡会温馨提醒一次，不阻塞打卡。</p>
    </div>

    <div class="card">
      <h2>个人历史</h2>
      <div id="history" class="list"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <h2>近两天排行榜</h2>
        <span class="time-pill" id="currentTime"></span>
      </div>
      <div class="leader-grid">
        <div>
          <h3>晚睡榜（夜猫子）</h3>
          <div id="nightOwls"></div>
        </div>
        <div>
          <h3>早起榜（百灵鸟）</h3>
          <div id="earlyBirds"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <h3 id="modalTitle">打卡补充信息</h3>
      <textarea id="reflection" placeholder="今日反思（可选）"></textarea>
      <textarea id="happyThing" placeholder="今天发生的新鲜/愉快事情（可选）" style="margin-top: 8px;"></textarea>
      <textarea id="plan" placeholder="明日计划（可选，不强制）" style="margin-top: 8px;"></textarea>
      <div class="actions">
        <button id="directBtn" class="ghost">直接打卡</button>
        <button id="cancelBtn">取消</button>
        <button id="saveBtn" class="primary">提交</button>
      </div>
    </div>
  </div>

  <script>
    const authPanel = document.getElementById("authPanel");
    const appPanel = document.getElementById("appPanel");
    const authUsernameEl = document.getElementById("authUsername");
    const authPasswordEl = document.getElementById("authPassword");
    const authMsgEl = document.getElementById("authMsg");
    const welcomeEl = document.getElementById("welcome");
    const historyEl = document.getElementById("history");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const reflectionEl = document.getElementById("reflection");
    const happyThingEl = document.getElementById("happyThing");
    const planEl = document.getElementById("plan");
    const nightOwlsEl = document.getElementById("nightOwls");
    const earlyBirdsEl = document.getElementById("earlyBirds");
    const currentTimeEl = document.getElementById("currentTime");
    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");
    const toastEl = document.getElementById("toast");
    const saveBtn = document.getElementById("saveBtn");
    const directBtn = document.getElementById("directBtn");
    let toastTimer = null;

    let modalMode = {
      type: "CREATE",
      checkType: "SLEEP",
      editId: null,
      original: { reflection: "", happyThing: "", plan: "" }
    };
    let currentUser = null;

    function getToken() {
      return localStorage.getItem("token") || "";
    }

    function setToken(token) {
      localStorage.setItem("token", token);
    }

    function authHeaders() {
      return { authorization: `Bearer ${getToken()}` };
    }

    function switchView(loggedIn) {
      authPanel.classList.toggle("hidden", loggedIn);
      appPanel.classList.toggle("hidden", !loggedIn);
    }

    function setMsg(text, type = "ok") {
      if (!text) {
        toastEl.className = "toast";
        toastEl.textContent = "";
        return;
      }
      toastEl.textContent = text;
      toastEl.className = `toast ${type}`;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.className = "toast";
      }, 2600);
    }

    function humanizeError(msg) {
      const raw = String(msg || "").toLowerCase();
      if (!raw) return "操作失败，请稍后重试。";
      if (raw.includes("username already exists")) return "该用户名已被注册，请换一个。";
      if (raw.includes("invalid credentials")) return "用户名或密码不正确。";
      if (raw.includes("username must be at least")) return "用户名至少 3 位。";
      if (raw.includes("password must be at least")) return "密码至少 6 位。";
      if (raw.includes("unauthorized")) return "登录状态已失效，请重新登录。";
      if (raw.includes("network")) return "网络异常，请检查网络后重试。";
      return msg;
    }

    function setAuthLoading(loading, action = "login") {
      registerBtn.disabled = loading;
      loginBtn.disabled = loading;
      registerBtn.textContent = loading && action === "register" ? "注册中..." : "注册";
      loginBtn.textContent = loading && action === "login" ? "登录中..." : "登录";
    }

    function setCheckinLoading(loading, action = "save") {
      saveBtn.disabled = loading;
      directBtn.disabled = loading;
      saveBtn.textContent = loading && action === "save" ? "提交中..." : "提交";
      directBtn.textContent = loading && action === "direct" ? "打卡中..." : "直接打卡";
    }

    async function parseJsonSafe(res) {
      const text = await res.text();
      if (!text) return {};
      try {
        return JSON.parse(text);
      } catch {
        return { error: text.slice(0, 200) || "服务返回非 JSON 数据" };
      }
    }

    function formatTime(isoString) {
      const d = new Date(isoString);
      return d.toLocaleString("zh-CN", { hour12: false });
    }

    async function fetchHistory() {
      try {
        const res = await fetch("/api/checkins", { headers: authHeaders() });
        if (res.status === 401) return logout();
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          setMsg(data.error || "加载历史失败", "err");
          return;
        }
        renderHistory(data.items || []);
      } catch (error) {
        setMsg(`加载历史失败：${String(error.message || error)}`, "err");
      }
    }

    function renderHistory(items) {
      historyEl.innerHTML = "";
      if (!items.length) {
        historyEl.innerHTML = '<div class="muted">暂无打卡记录</div>';
        return;
      }
      for (const item of items) {
        const wrap = document.createElement("div");
        wrap.className = "item";
        const reflection = item.reflection || "";
        const happyThing = item.happy_thing || "";
        const plan = item.plan || "";
        const reflectionText = reflection ? `今日反思：${reflection}` : '<span class="placeholder">暂无内容，点击补充...</span>';
        const happyText = happyThing ? `新鲜愉快：${happyThing}` : '<span class="placeholder">暂无内容，点击补充...</span>';
        const planText = plan ? `明日计划：${plan}` : '<span class="placeholder">暂无内容，点击补充...</span>';
        wrap.innerHTML = `
          <div class="item-head">
            <div>
              <span class="tag">${item.type === "SLEEP" ? "晚睡" : "早起"}</span>
              <span class="muted">${formatTime(item.check_time)}</span>
            </div>
            <button class="edit-btn" data-id="${item.id}" title="编辑">✎</button>
          </div>
          <div style="margin-top:8px;">${reflectionText}</div>
          <div style="margin-top:6px;">${happyText}</div>
          <div style="margin-top:6px;">${planText}</div>
        `;
        wrap.querySelector(".edit-btn").addEventListener("click", () => openEdit(item));
        wrap.querySelectorAll(".placeholder").forEach((el) => {
          el.addEventListener("click", () => openEdit(item));
        });
        historyEl.appendChild(wrap);
      }
    }

    async function fetchLeaderboard() {
      try {
        const res = await fetch("/api/leaderboard");
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          setMsg(data.error || "加载排行榜失败", "err");
          renderRanks(nightOwlsEl, []);
          renderRanks(earlyBirdsEl, []);
          currentTimeEl.textContent = `当前时间：${formatTime(new Date().toISOString())}`;
          return;
        }
        renderRanks(nightOwlsEl, data.nightOwls || []);
        renderRanks(earlyBirdsEl, data.earlyBirds || []);
        currentTimeEl.textContent = `当前时间：${formatTime(data.currentTime || new Date().toISOString())}`;
      } catch (error) {
        setMsg(`加载排行榜失败：${String(error.message || error)}`, "err");
      }
    }

    function renderRanks(el, rows) {
      if (!rows.length) {
        el.innerHTML = '<div class="muted">暂无数据</div>';
        return;
      }
      el.innerHTML = rows.map((r, i) =>
        `<div class="rank-item"><span>#${i + 1} ${r.username}</span><span>${formatTime(r.check_time)}</span></div>`
      ).join("");
    }

    function shouldWarnLateSleep() {
      const now = new Date();
      const hour = now.getHours();
      if (hour < 22) return false;
      const key = `sleep_warned_${now.toISOString().slice(0, 10)}`;
      if (localStorage.getItem(key) === "1") return false;
      localStorage.setItem(key, "1");
      return true;
    }

    function openCreate(checkType) {
      modalMode = {
        type: "CREATE",
        checkType,
        editId: null,
        original: { reflection: "", happyThing: "", plan: "" }
      };
      modalTitle.textContent = checkType === "SLEEP"
        ? "晚睡打卡：写下反思、新鲜愉快事情和明日计划"
        : "早起打卡：写下反思、新鲜愉快事情和明日计划";
      reflectionEl.value = "";
      happyThingEl.value = "";
      planEl.value = "";
      modalBackdrop.classList.add("open");
      reflectionEl.focus();
      if (checkType === "SLEEP" && shouldWarnLateSleep()) {
        alert("22:00 后仍在活动，注意休息哦。");
      }
    }

    function openEdit(item) {
      modalMode = {
        type: "EDIT",
        checkType: item.type,
        editId: item.id,
        original: {
          reflection: item.reflection || "",
          happyThing: item.happy_thing || "",
          plan: item.plan || ""
        }
      };
      modalTitle.textContent = "编辑反思 / 新鲜愉快事情 / 明日计划";
      reflectionEl.value = item.reflection || "";
      happyThingEl.value = item.happy_thing || "";
      planEl.value = item.plan || "";
      modalBackdrop.classList.add("open");
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
    }

    async function submitModal(forceEmpty = false) {
      const reflection = forceEmpty ? "" : reflectionEl.value.trim();
      const happyThing = forceEmpty ? "" : happyThingEl.value.trim();
      const plan = forceEmpty ? "" : planEl.value.trim();
      try {
        setCheckinLoading(true, forceEmpty ? "direct" : "save");
        let res;
        if (modalMode.type === "CREATE") {
          res = await fetch("/api/checkins", {
            method: "POST",
            headers: { "content-type": "application/json", ...authHeaders() },
            body: JSON.stringify({
              type: modalMode.checkType,
              reflection,
              happyThing,
              plan,
              checkTime: new Date().toISOString()
            })
          });
        } else {
          const payload = {};
          if (reflection !== modalMode.original.reflection) payload.reflection = reflection;
          if (happyThing !== modalMode.original.happyThing) payload.happyThing = happyThing;
          if (plan !== modalMode.original.plan) payload.plan = plan;

          if (!Object.keys(payload).length) {
            closeModal();
            setMsg("未检测到改动，无需保存", "ok");
            return;
          }

          res = await fetch(`/api/checkins/${modalMode.editId}`, {
            method: "PATCH",
            headers: { "content-type": "application/json", ...authHeaders() },
            body: JSON.stringify(payload)
          });
        }
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          setMsg(humanizeError(data.error || "保存失败"), "err");
          return;
        }
        closeModal();
        await Promise.all([fetchHistory(), fetchLeaderboard()]);
        setMsg("保存成功", "ok");
      } catch (error) {
        setMsg(`保存失败：${humanizeError(String(error.message || error))}`, "err");
      } finally {
        setCheckinLoading(false);
      }
    }

    async function auth(path) {
      const username = authUsernameEl.value.trim();
      const password = authPasswordEl.value;
      if (!username || !password) {
        authMsgEl.textContent = "请先输入用户名和密码。";
        setMsg("请先输入用户名和密码。", "err");
        return;
      }
      if (username.length < 3) {
        authMsgEl.textContent = "用户名至少 3 位。";
        setMsg("用户名至少 3 位。", "err");
        return;
      }
      if (password.length < 6) {
        authMsgEl.textContent = "密码至少 6 位。";
        setMsg("密码至少 6 位。", "err");
        return;
      }
      setAuthLoading(true, path);
      authMsgEl.textContent = "";
      setMsg(path === "register" ? "注册中..." : "登录中...", "ok");
      try {
        const res = await fetch(`/api/auth/${path}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          const msg = humanizeError(data.error || "操作失败");
          authMsgEl.textContent = msg;
          setMsg(msg, "err");
          return;
        }
        setToken(data.token);
        currentUser = data.username;
        welcomeEl.textContent = `你好，${currentUser}`;
        switchView(true);
        authMsgEl.textContent = "";
        await Promise.all([fetchHistory(), fetchLeaderboard()]);
        setMsg(path === "register" ? "注册并登录成功" : "登录成功", "ok");
      } catch (error) {
        authMsgEl.textContent = "网络异常，请稍后重试。";
        setMsg(`请求失败：${humanizeError(String(error.message || error))}`, "err");
      } finally {
        setAuthLoading(false);
      }
    }

    function logout() {
      localStorage.removeItem("token");
      currentUser = null;
      switchView(false);
      setMsg("你已退出登录", "ok");
    }

    document.getElementById("sleepBtn").addEventListener("click", () => openCreate("SLEEP"));
    document.getElementById("wakeBtn").addEventListener("click", () => openCreate("WAKE"));
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("saveBtn").addEventListener("click", () => submitModal(false));
    document.getElementById("directBtn").addEventListener("click", () => submitModal(true));
    document.getElementById("registerBtn").addEventListener("click", () => auth("register"));
    document.getElementById("loginBtn").addEventListener("click", () => auth("login"));
    document.getElementById("logoutBtn").addEventListener("click", logout);
    authPasswordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") auth("login");
    });
    authUsernameEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") auth("login");
    });

    if (getToken()) {
      currentUser = "已登录用户";
      welcomeEl.textContent = `你好，${currentUser}`;
      switchView(true);
      Promise.all([fetchHistory(), fetchLeaderboard()]);
    } else {
      switchView(false);
      fetchLeaderboard();
    }
  </script>
</body>
</html>
