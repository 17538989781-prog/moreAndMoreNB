<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>睡眠打卡系统</title>
  <style>
    :root { color-scheme: light; font-family: "Segoe UI", "PingFang SC", sans-serif; }
    body { margin: 0; background: linear-gradient(120deg, #eef2ff, #f8fafc); color: #1f2937; }
    .container { max-width: 1040px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 28px rgba(17, 24, 39, .08); padding: 20px; margin-bottom: 16px; }
    h1, h2, h3 { margin: 0 0 12px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, textarea, button { font: inherit; }
    input, textarea { border: 1px solid #d1d5db; border-radius: 10px; padding: 10px; width: 100%; box-sizing: border-box; background: #fff; }
    textarea { min-height: 84px; resize: vertical; }
    button { border: 0; border-radius: 10px; padding: 10px 14px; cursor: pointer; }
    .primary { background: #1d4ed8; color: #fff; }
    .ghost { background: #eef2ff; color: #1d4ed8; }
    .danger { background: #fee2e2; color: #b91c1c; }
    .muted { color: #6b7280; font-size: 14px; }
    .hidden { display: none !important; }
    .list { display: grid; gap: 10px; }
    .item { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
    .item-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .tag { padding: 2px 8px; border-radius: 999px; font-size: 12px; background: #eef2ff; color: #3730a3; }
    .placeholder { color: #9ca3af; cursor: pointer; }
    .edit-btn { background: transparent; color: #4b5563; padding: 0; font-size: 18px; }
    .leader-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .checkin-wrap { display: grid; place-items: center; gap: 10px; margin-top: 8px; }
    .checkin-ring {
      --progress: 0deg;
      width: 132px;
      height: 132px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: conic-gradient(#60a5fa var(--progress), #dbeafe var(--progress));
      box-shadow: 0 10px 24px rgba(37, 99, 235, .24);
      animation: ringGlow 2.6s ease-in-out infinite;
    }
    @keyframes ringGlow {
      0%, 100% { box-shadow: 0 10px 24px rgba(37, 99, 235, .20); }
      50% { box-shadow: 0 14px 28px rgba(59, 130, 246, .36); }
    }
    .checkin-circle {
      width: 118px;
      height: 118px;
      border-radius: 999px;
      border: 0;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 24px rgba(37, 99, 235, .28);
      font-weight: 700;
      font-size: 18px;
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1.2;
    }
    .checkin-main { font-size: 18px; font-weight: 700; }
    .checkin-time { font-size: 12px; opacity: .96; }
    .checkin-circle:active { transform: scale(.98); }
    .history-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .history-nav button { background: #f3f4f6; color: #374151; }
    .history-nav .active { background: #1d4ed8; color: #fff; }
    .sub-actions { display: flex; gap: 8px; margin-top: 8px; }
    .sub-btn { background: #f3f4f6; color: #374151; padding: 6px 10px; border-radius: 8px; font-size: 12px; }
    .rank-item { border-bottom: 1px dashed #e5e7eb; padding: 10px 0; }
    .rank-top { display: flex; justify-content: space-between; gap: 10px; }
    .tag-row { display: grid; gap: 8px; margin-top: 8px; }
    .field-title { color: #4b5563; font-size: 13px; }
    .field-actions { display: flex; justify-content: flex-end; }
    .mini-save { background: #eef2ff; color: #1d4ed8; padding: 6px 10px; border-radius: 8px; font-size: 12px; }
    .comments-panel { max-height: 260px; overflow: auto; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; }
    .comment-item { border-bottom: 1px dashed #e5e7eb; padding: 8px 0; }
    .comment-item:last-child { border-bottom: 0; }
    .modal-backdrop { position: fixed; inset: 0; display: none; place-items: center; background: rgba(17, 24, 39, .45); z-index: 20; }
    .modal { width: min(700px, 92vw); background: #fff; border-radius: 14px; padding: 16px; }
    .modal-backdrop.open { display: grid; }
    .modal.open { display: grid; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
    .auth-wrap { max-width: 460px; margin: 60px auto; }
    .time-pill { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #eef2ff; color: #1e40af; font-size: 13px; }
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .12);
      font-size: 14px;
      z-index: 30;
      display: none;
      max-width: min(92vw, 760px);
    }
    .toast.ok { display: block; background: #ecfdf3; color: #166534; border: 1px solid #86efac; }
    .toast.err { display: block; background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    button:disabled { opacity: .65; cursor: not-allowed; }
    @media (max-width: 760px) { .leader-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="container hidden" id="authPanel">
    <div class="auth-wrap card">
      <h1>欢迎来到睡眠打卡</h1>
      <p class="muted">简洁记录作息，回顾反思与每天的新鲜愉快小事。</p>
      <div class="row">
        <input id="authUsername" placeholder="用户名（至少3位）">
        <input id="authPassword" type="password" placeholder="密码（至少6位）">
      </div>
      <div class="actions">
        <button id="registerBtn" class="ghost">注册</button>
        <button id="loginBtn" class="primary">登录</button>
      </div>
      <p id="authMsg" class="muted"></p>
      <p class="muted">支持回车快速登录，明日计划可不填。</p>
    </div>
  </div>

  <div class="container hidden" id="appPanel">
    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <h1>睡眠打卡系统</h1>
        <div class="row">
          <span id="welcome" class="muted"></span>
          <button id="logoutBtn" class="danger">退出登录</button>
        </div>
      </div>
      <div class="checkin-wrap">
        <div id="checkinRing" class="checkin-ring">
          <button id="checkinCircleBtn" class="checkin-circle">
            <span class="checkin-main">打卡</span>
            <span id="checkinTimeText" class="checkin-time">--:--:--</span>
          </button>
        </div>
        <span class="muted">北京时间</span>
        <span class="muted">单击后自动判断为「晚睡/早起」，并可立即补写三项内容</span>
      </div>
      <p class="muted">打卡后可直接选择标签并写入数据库，不需要等待后续开发。</p>
    </div>

    <div class="card">
      <h2>个人历史记录</h2>
      <div class="history-nav">
        <button id="viewReflectionPageBtn" class="active">心得记录</button>
        <button id="viewPlanPageBtn">明日计划</button>
        <button id="viewHappyPageBtn">高兴的事</button>
      </div>
      <div id="history" class="list"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <h2>近两天排行榜</h2>
        <span class="time-pill" id="currentTime"></span>
      </div>
      <div class="leader-grid">
        <div>
          <h3>晚睡榜（夜猫子）</h3>
          <div class="sub-actions"><button id="viewNightRankBtn" class="sub-btn">查看晚睡榜详情</button></div>
          <div id="nightOwls"></div>
        </div>
        <div>
          <h3>早起榜（百灵鸟）</h3>
          <div class="sub-actions"><button id="viewEarlyRankBtn" class="sub-btn">查看早起榜详情</button></div>
          <div id="earlyBirds"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>公共评论区</h2>
      <div class="row">
        <input id="commentInput" maxlength="300" placeholder="发布你的发言（所有人可见，最多300字）">
        <button id="commentSendBtn" class="primary">发布</button>
      </div>
      <p class="muted">按最新发布时间排序显示，可滚动查看历史内容。</p>
      <div id="commentsList" class="comments-panel"></div>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <h3 id="modalTitle">打卡补充信息</h3>
      <div id="reflectionRow" class="tag-row">
        <span class="field-title">心得标签（可选）</span>
        <select id="reflectionTag"><option value="">不选标签</option><option>学习</option><option>效率</option><option>情绪</option><option>健康</option></select>
        <textarea id="reflection" placeholder="今日反思（可选）"></textarea>
        <div class="field-actions"><button id="saveReflectionOnlyBtn" class="mini-save">添加心得</button></div>
      </div>
      <div id="happyThingRow" class="tag-row">
        <span class="field-title">高兴的事标签（可选）</span>
        <select id="happyTag"><option value="">不选标签</option><option>工作</option><option>生活</option><option>朋友</option><option>运动</option></select>
        <textarea id="happyThing" placeholder="今天发生的新鲜/愉快事情（可选）"></textarea>
        <div class="field-actions"><button id="saveHappyOnlyBtn" class="mini-save">添加高兴的事</button></div>
      </div>
      <div id="planRow" class="tag-row">
        <span class="field-title">计划标签（可选）</span>
        <select id="planTag"><option value="">不选标签</option><option>早起</option><option>学习</option><option>健身</option><option>专注</option></select>
        <textarea id="plan" placeholder="明日计划（可选，不强制）"></textarea>
        <div class="field-actions"><button id="savePlanOnlyBtn" class="mini-save">添加明日计划</button></div>
      </div>
      <div class="actions">
        <button id="directBtn" class="ghost">仅打卡不填写</button>
        <button id="cancelBtn">取消</button>
        <button id="saveBtn" class="primary">提交</button>
      </div>
    </div>
  </div>

  <div id="rankModalBackdrop" class="modal-backdrop">
    <div class="modal">
      <h3 id="rankModalTitle">排行榜详情</h3>
      <div id="rankModalList" class="list"></div>
      <div class="actions">
        <button id="closeRankModalBtn" class="primary">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const authPanel = document.getElementById("authPanel");
    const appPanel = document.getElementById("appPanel");
    const authUsernameEl = document.getElementById("authUsername");
    const authPasswordEl = document.getElementById("authPassword");
    const authMsgEl = document.getElementById("authMsg");
    const welcomeEl = document.getElementById("welcome");
    const historyEl = document.getElementById("history");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const reflectionEl = document.getElementById("reflection");
    const happyThingEl = document.getElementById("happyThing");
    const planEl = document.getElementById("plan");
    const reflectionRowEl = document.getElementById("reflectionRow");
    const happyThingRowEl = document.getElementById("happyThingRow");
    const planRowEl = document.getElementById("planRow");
    const nightOwlsEl = document.getElementById("nightOwls");
    const earlyBirdsEl = document.getElementById("earlyBirds");
    const currentTimeEl = document.getElementById("currentTime");
    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");
    const toastEl = document.getElementById("toast");
    const saveBtn = document.getElementById("saveBtn");
    const directBtn = document.getElementById("directBtn");
    const reflectionTagEl = document.getElementById("reflectionTag");
    const happyTagEl = document.getElementById("happyTag");
    const planTagEl = document.getElementById("planTag");
    const checkinRingEl = document.getElementById("checkinRing");
    const checkinTimeTextEl = document.getElementById("checkinTimeText");
    const rankModalBackdrop = document.getElementById("rankModalBackdrop");
    const rankModalTitle = document.getElementById("rankModalTitle");
    const rankModalList = document.getElementById("rankModalList");
    const commentInputEl = document.getElementById("commentInput");
    const commentSendBtn = document.getElementById("commentSendBtn");
    const commentsListEl = document.getElementById("commentsList");
    let toastTimer = null;
    let leaderboardCache = { nightOwls: [], earlyBirds: [] };
    let historyItemsCache = [];
    let activeHistoryView = "reflection";

    let modalMode = {
      type: "CREATE",
      checkType: "SLEEP",
      editId: null,
      original: { reflection: "", reflectionTag: "", happyThing: "", happyTag: "", plan: "", planTag: "" }
    };
    let currentUser = null;

    function getToken() {
      return localStorage.getItem("token") || "";
    }

    function setToken(token) {
      localStorage.setItem("token", token);
    }

    function authHeaders() {
      return { authorization: `Bearer ${getToken()}` };
    }

    function switchView(loggedIn) {
      authPanel.classList.toggle("hidden", loggedIn);
      appPanel.classList.toggle("hidden", !loggedIn);
    }

    function setMsg(text, type = "ok") {
      if (!text) {
        toastEl.className = "toast";
        toastEl.textContent = "";
        return;
      }
      toastEl.textContent = text;
      toastEl.className = `toast ${type}`;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.className = "toast";
      }, 2600);
    }

    function humanizeError(msg) {
      const raw = String(msg || "").toLowerCase();
      if (!raw) return "操作失败，请稍后重试。";
      if (raw.includes("username already exists")) return "该用户名已被注册，请换一个。";
      if (raw.includes("invalid credentials")) return "用户名或密码不正确。";
      if (raw.includes("username must be at least")) return "用户名至少 3 位。";
      if (raw.includes("password must be at least")) return "密码至少 6 位。";
      if (raw.includes("unauthorized")) return "登录状态已失效，请重新登录。";
      if (raw.includes("network")) return "网络异常，请检查网络后重试。";
      return msg;
    }

    function setAuthLoading(loading, action = "login") {
      registerBtn.disabled = loading;
      loginBtn.disabled = loading;
      registerBtn.textContent = loading && action === "register" ? "注册中..." : "注册";
      loginBtn.textContent = loading && action === "login" ? "登录中..." : "登录";
    }

    function setCheckinLoading(loading, action = "save") {
      saveBtn.disabled = loading;
      directBtn.disabled = loading;
      saveBtn.textContent = loading && action === "save" ? "提交中..." : "提交";
      directBtn.textContent = loading && action === "direct" ? "打卡中..." : "直接打卡";
    }

    async function parseJsonSafe(res) {
      const text = await res.text();
      if (!text) return {};
      try {
        return JSON.parse(text);
      } catch {
        return { error: text.slice(0, 200) || "服务返回非 JSON 数据" };
      }
    }

    function formatTime(isoString) {
      const d = new Date(isoString);
      return d.toLocaleString("zh-CN", { hour12: false });
    }

    function getBeijingTimeParts() {
      const now = new Date();
      const utcMs = now.getTime() + now.getTimezoneOffset() * 60 * 1000;
      const bj = new Date(utcMs + 8 * 60 * 60 * 1000);
      const hh = String(bj.getUTCHours()).padStart(2, "0");
      const mm = String(bj.getUTCMinutes()).padStart(2, "0");
      const ss = String(bj.getUTCSeconds()).padStart(2, "0");
      return {
        hour: Number(hh),
        minute: Number(mm),
        second: Number(ss),
        millis: now.getMilliseconds(),
        dateKey: `${bj.getUTCFullYear()}-${String(bj.getUTCMonth() + 1).padStart(2, "0")}-${String(bj.getUTCDate()).padStart(2, "0")}`,
        text: `${hh}:${mm}:${ss}`
      };
    }

    async function fetchHistory() {
      try {
        const res = await fetch("/api/checkins", { headers: authHeaders() });
        if (res.status === 401) return logout();
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          setMsg(data.error || "加载历史失败", "err");
          return;
        }
        renderHistory(data.items || []);
      } catch (error) {
        setMsg(`加载历史失败：${String(error.message || error)}`, "err");
      }
    }

    function renderHistory(items) {
      historyItemsCache = items;
      renderHistoryByView();
    }

    function renderHistoryByView() {
      const items = historyItemsCache;
      historyEl.innerHTML = "";
      if (!items.length) {
        historyEl.innerHTML = '<div class="muted">暂无打卡记录</div>';
        return;
      }
      const mapped = items.filter((item) => {
        if (activeHistoryView === "reflection") return String(item.reflection || "").trim().length > 0;
        if (activeHistoryView === "plan") return String(item.plan || "").trim().length > 0;
        return String(item.happy_thing || "").trim().length > 0;
      });
      if (!mapped.length) {
        historyEl.innerHTML = '<div class="muted">当前分类暂无内容，点击上方按钮切换分类或先去补写。</div>';
        return;
      }
      for (const item of mapped) {
        const wrap = document.createElement("div");
        wrap.className = "item";
        const reflection = item.reflection || "";
        const happyThing = item.happy_thing || "";
        const plan = item.plan || "";
        const detailText = activeHistoryView === "reflection"
          ? `心得：${reflection || "暂无"}`
          : activeHistoryView === "plan"
            ? `明日计划：${plan || "暂无"}`
            : `高兴的事：${happyThing || "暂无"}`;
        wrap.innerHTML = `
          <div class="item-head">
            <div>
              <span class="tag">${item.type === "SLEEP" ? "晚睡" : "早起"}</span>
              <span class="muted">${formatTime(item.check_time)}</span>
            </div>
            <button class="edit-btn" data-id="${item.id}" title="编辑">✎</button>
          </div>
          <div style="margin-top:8px;">${detailText}</div>
          <div class="sub-actions">
            <button class="sub-btn edit-reflection-btn" data-id="${item.id}">补写心得</button>
            <button class="sub-btn edit-plan-btn" data-id="${item.id}">补写计划</button>
            <button class="sub-btn edit-happy-btn" data-id="${item.id}">补写高兴的事</button>
          </div>
        `;
        wrap.querySelector(".edit-btn").addEventListener("click", () => openEdit(item, null));
        wrap.querySelector(".edit-reflection-btn").addEventListener("click", () => openEdit(item, "reflection"));
        wrap.querySelector(".edit-plan-btn").addEventListener("click", () => openEdit(item, "plan"));
        wrap.querySelector(".edit-happy-btn").addEventListener("click", () => openEdit(item, "happyThing"));
        historyEl.appendChild(wrap);
      }
    }

    async function fetchLeaderboard() {
      try {
        const res = await fetch("/api/leaderboard");
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          setMsg(data.error || "加载排行榜失败", "err");
          renderRanks(nightOwlsEl, []);
          renderRanks(earlyBirdsEl, []);
          currentTimeEl.textContent = `当前时间：${formatTime(new Date().toISOString())}`;
          return;
        }
        renderRanks(nightOwlsEl, data.nightOwls || []);
        renderRanks(earlyBirdsEl, data.earlyBirds || []);
        leaderboardCache = {
          nightOwls: data.nightOwls || [],
          earlyBirds: data.earlyBirds || []
        };
        currentTimeEl.textContent = `当前时间：${formatTime(data.currentTime || new Date().toISOString())}`;
      } catch (error) {
        setMsg(`加载排行榜失败：${String(error.message || error)}`, "err");
      }
    }

    function renderRanks(el, rows) {
      if (!rows.length) {
        el.innerHTML = '<div class="muted">暂无数据</div>';
        return;
      }
      el.innerHTML = rows.map((r, i) => `
        <div class="rank-item">
          <div class="rank-top">
            <span>#${i + 1} ${r.username}</span>
            <span class="muted">${formatTime(r.check_time)}</span>
          </div>
        </div>
      `).join("");
    }

    function inferCheckinType() {
      const hour = getBeijingTimeParts().hour;
      return hour >= 22 || hour < 5 ? "SLEEP" : "WAKE";
    }

    function updateCheckinClock() {
      const bj = getBeijingTimeParts();
      checkinTimeTextEl.textContent = bj.text;
      const secProgress = ((bj.second + bj.millis / 1000) / 60) * 360;
      checkinRingEl.style.setProperty("--progress", `${secProgress.toFixed(2)}deg`);
    }

    function openCreateFromCircle() {
      const checkType = inferCheckinType();
      modalMode = {
        type: "CREATE",
        checkType,
        editId: null,
        onlyField: null,
        original: { reflection: "", reflectionTag: "", happyThing: "", happyTag: "", plan: "", planTag: "" }
      };
      modalTitle.textContent = checkType === "SLEEP" ? "本次自动识别为：晚睡打卡" : "本次自动识别为：早起打卡";
      reflectionEl.value = "";
      happyThingEl.value = "";
      planEl.value = "";
      reflectionTagEl.value = "";
      happyTagEl.value = "";
      planTagEl.value = "";
      reflectionRowEl.style.display = "grid";
      happyThingRowEl.style.display = "grid";
      planRowEl.style.display = "grid";
      directBtn.style.display = "inline-block";
      modalBackdrop.classList.add("open");
      setMsg("已打开打卡填写弹窗", "ok");
    }

    function shouldWarnLateSleep() {
      const bj = getBeijingTimeParts();
      const hour = bj.hour;
      if (hour < 22) return false;
      const key = `sleep_warned_${bj.dateKey}`;
      if (localStorage.getItem(key) === "1") return false;
      localStorage.setItem(key, "1");
      return true;
    }

    function openEdit(item, onlyField = null) {
      modalMode = {
        type: "EDIT",
        checkType: item.type,
        editId: item.id,
        onlyField,
        original: {
          reflection: item.reflection || "",
          reflectionTag: item.reflection_tag || "",
          happyThing: item.happy_thing || "",
          happyTag: item.happy_tag || "",
          plan: item.plan || "",
          planTag: item.plan_tag || ""
        }
      };
      modalTitle.textContent = onlyField === "reflection"
        ? "补写心得"
        : onlyField === "plan"
          ? "补写明日计划"
          : onlyField === "happyThing"
            ? "补写高兴的事"
            : "编辑反思 / 新鲜愉快事情 / 明日计划";
      reflectionEl.value = item.reflection || "";
      happyThingEl.value = item.happy_thing || "";
      planEl.value = item.plan || "";
      reflectionTagEl.value = item.reflection_tag || "";
      happyTagEl.value = item.happy_tag || "";
      planTagEl.value = item.plan_tag || "";
      reflectionRowEl.style.display = !onlyField || onlyField === "reflection" ? "block" : "none";
      happyThingRowEl.style.display = !onlyField || onlyField === "happyThing" ? "block" : "none";
      planRowEl.style.display = !onlyField || onlyField === "plan" ? "block" : "none";
      directBtn.style.display = "none";
      modalBackdrop.classList.add("open");
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      reflectionRowEl.style.display = "grid";
      happyThingRowEl.style.display = "grid";
      planRowEl.style.display = "grid";
      directBtn.style.display = "inline-block";
    }

    async function submitModal(forceEmpty = false) {
      const reflection = forceEmpty ? "" : String(reflectionEl.value || "").trim();
      const reflectionTag = forceEmpty ? "" : String(reflectionTagEl.value || "").trim();
      const happyThing = forceEmpty ? "" : String(happyThingEl.value || "").trim();
      const happyTag = forceEmpty ? "" : String(happyTagEl.value || "").trim();
      const plan = forceEmpty ? "" : String(planEl.value || "").trim();
      const planTag = forceEmpty ? "" : String(planTagEl.value || "").trim();
      try {
        setCheckinLoading(true, forceEmpty ? "direct" : "save");
        let res;
        if (modalMode.type === "CREATE") {
          res = await fetch("/api/checkins", {
            method: "POST",
            headers: { "content-type": "application/json", ...authHeaders() },
            body: JSON.stringify({
              type: modalMode.checkType,
              reflection,
              reflectionTag,
              happyThing,
              happyTag,
              plan,
              planTag,
              checkTime: new Date().toISOString()
            })
          });
        } else {
          const payload = {};
          if (!modalMode.onlyField || modalMode.onlyField === "reflection") {
            if (reflection !== modalMode.original.reflection) payload.reflection = reflection;
            if (reflectionTag !== modalMode.original.reflectionTag) payload.reflectionTag = reflectionTag;
          }
          if (!modalMode.onlyField || modalMode.onlyField === "happyThing") {
            if (happyThing !== modalMode.original.happyThing) payload.happyThing = happyThing;
            if (happyTag !== modalMode.original.happyTag) payload.happyTag = happyTag;
          }
          if (!modalMode.onlyField || modalMode.onlyField === "plan") {
            if (plan !== modalMode.original.plan) payload.plan = plan;
            if (planTag !== modalMode.original.planTag) payload.planTag = planTag;
          }

          if (!Object.keys(payload).length) {
            closeModal();
            setMsg("未检测到改动，无需保存", "ok");
            return;
          }

          res = await fetch(`/api/checkins/${modalMode.editId}`, {
            method: "PATCH",
            headers: { "content-type": "application/json", ...authHeaders() },
            body: JSON.stringify(payload)
          });
        }
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          setMsg(humanizeError(data.error || "保存失败"), "err");
          return;
        }
        closeModal();
        await Promise.all([fetchHistory(), fetchLeaderboard(), fetchComments()]);
        setMsg("保存成功", "ok");
      } catch (error) {
        setMsg(`保存失败：${humanizeError(String(error.message || error))}`, "err");
      } finally {
        setCheckinLoading(false);
      }
    }

    async function submitOnlyField(field) {
      const oldField = modalMode.onlyField || null;
      modalMode.onlyField = field;
      try {
        await submitModal(false);
      } finally {
        modalMode.onlyField = oldField;
      }
    }

    function openRankModal(kind) {
      const rows = kind === "night" ? leaderboardCache.nightOwls : leaderboardCache.earlyBirds;
      rankModalTitle.textContent = kind === "night" ? "晚睡榜详情（夜猫子）" : "早起榜详情（百灵鸟）";
      if (!rows.length) {
        rankModalList.innerHTML = '<div class="muted">暂无数据</div>';
      } else {
        rankModalList.innerHTML = rows.map((r, i) => `
          <div class="item">
            <div class="item-head">
              <span class="tag">#${i + 1} ${r.username}</span>
              <span class="muted">${formatTime(r.check_time)}</span>
            </div>
          </div>
        `).join("");
      }
      rankModalBackdrop.classList.add("open");
    }

    function setHistoryView(view) {
      activeHistoryView = view;
      document.getElementById("viewReflectionPageBtn").classList.toggle("active", view === "reflection");
      document.getElementById("viewPlanPageBtn").classList.toggle("active", view === "plan");
      document.getElementById("viewHappyPageBtn").classList.toggle("active", view === "happyThing");
      renderHistoryByView();
    }

    function renderComments(items) {
      if (!items.length) {
        commentsListEl.innerHTML = '<div class="muted">暂无发言，快来发布第一条吧。</div>';
        return;
      }
      commentsListEl.innerHTML = items.map((item) => `
        <div class="comment-item">
          <div class="item-head">
            <span class="tag">${item.username}</span>
            <span class="muted">${formatTime(item.created_at)}</span>
          </div>
          <div style="margin-top:6px; white-space:pre-wrap;">${String(item.content || "")}</div>
        </div>
      `).join("");
    }

    async function fetchComments() {
      try {
        const res = await fetch("/api/comments");
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          setMsg(data.error || "加载评论失败", "err");
          return;
        }
        renderComments(data.items || []);
      } catch (error) {
        setMsg(`加载评论失败：${String(error.message || error)}`, "err");
      }
    }

    async function publishComment() {
      const content = String(commentInputEl.value || "").trim();
      if (!content) {
        setMsg("请先输入发言内容", "err");
        return;
      }
      try {
        commentSendBtn.disabled = true;
        commentSendBtn.textContent = "发布中...";
        const res = await fetch("/api/comments", {
          method: "POST",
          headers: { "content-type": "application/json", ...authHeaders() },
          body: JSON.stringify({ content })
        });
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          setMsg(humanizeError(data.error || "发布失败"), "err");
          return;
        }
        commentInputEl.value = "";
        await fetchComments();
        setMsg("发言已发布", "ok");
      } catch (error) {
        setMsg(`发布失败：${String(error.message || error)}`, "err");
      } finally {
        commentSendBtn.disabled = false;
        commentSendBtn.textContent = "发布";
      }
    }

    async function auth(path) {
      const username = authUsernameEl.value.trim();
      const password = authPasswordEl.value;
      if (!username || !password) {
        authMsgEl.textContent = "请先输入用户名和密码。";
        setMsg("请先输入用户名和密码。", "err");
        return;
      }
      if (username.length < 3) {
        authMsgEl.textContent = "用户名至少 3 位。";
        setMsg("用户名至少 3 位。", "err");
        return;
      }
      if (password.length < 6) {
        authMsgEl.textContent = "密码至少 6 位。";
        setMsg("密码至少 6 位。", "err");
        return;
      }
      setAuthLoading(true, path);
      authMsgEl.textContent = "";
      setMsg(path === "register" ? "注册中..." : "登录中...", "ok");
      try {
        const res = await fetch(`/api/auth/${path}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await parseJsonSafe(res);
        if (!res.ok) {
          const msg = humanizeError(data.error || "操作失败");
          authMsgEl.textContent = msg;
          setMsg(msg, "err");
          return;
        }
        setToken(data.token);
        currentUser = data.username;
        welcomeEl.textContent = `你好，${currentUser}`;
        switchView(true);
        authMsgEl.textContent = "";
        await Promise.all([fetchHistory(), fetchLeaderboard()]);
        setMsg(path === "register" ? "注册并登录成功" : "登录成功", "ok");
      } catch (error) {
        authMsgEl.textContent = "网络异常，请稍后重试。";
        setMsg(`请求失败：${humanizeError(String(error.message || error))}`, "err");
      } finally {
        setAuthLoading(false);
      }
    }

    function logout() {
      localStorage.removeItem("token");
      currentUser = null;
      switchView(false);
      setMsg("你已退出登录", "ok");
    }

    document.getElementById("checkinCircleBtn").addEventListener("click", openCreateFromCircle);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("saveBtn").addEventListener("click", () => submitModal(false));
    document.getElementById("directBtn").addEventListener("click", () => submitModal(true));
    document.getElementById("saveReflectionOnlyBtn").addEventListener("click", () => submitOnlyField("reflection"));
    document.getElementById("saveHappyOnlyBtn").addEventListener("click", () => submitOnlyField("happyThing"));
    document.getElementById("savePlanOnlyBtn").addEventListener("click", () => submitOnlyField("plan"));
    document.getElementById("viewReflectionPageBtn").addEventListener("click", () => setHistoryView("reflection"));
    document.getElementById("viewPlanPageBtn").addEventListener("click", () => setHistoryView("plan"));
    document.getElementById("viewHappyPageBtn").addEventListener("click", () => setHistoryView("happyThing"));
    document.getElementById("viewNightRankBtn").addEventListener("click", () => openRankModal("night"));
    document.getElementById("viewEarlyRankBtn").addEventListener("click", () => openRankModal("early"));
    document.getElementById("closeRankModalBtn").addEventListener("click", () => rankModalBackdrop.classList.remove("open"));
    document.getElementById("registerBtn").addEventListener("click", () => auth("register"));
    document.getElementById("loginBtn").addEventListener("click", () => auth("login"));
    document.getElementById("logoutBtn").addEventListener("click", logout);
    commentSendBtn.addEventListener("click", publishComment);
    authPasswordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") auth("login");
    });
    authUsernameEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") auth("login");
    });

    updateCheckinClock();
    setInterval(updateCheckinClock, 200);

    if (getToken()) {
      currentUser = "已登录用户";
      welcomeEl.textContent = `你好，${currentUser}`;
      switchView(true);
      Promise.all([fetchHistory(), fetchLeaderboard(), fetchComments()]);
    } else {
      switchView(false);
      Promise.all([fetchLeaderboard(), fetchComments()]);
    }
  </script>
</body>
</html>
